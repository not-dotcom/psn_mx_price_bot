name: Actualizar Precios PSN
on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *" #

concurrency:
  group: update-prices-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Ejecutar Scraper
        run: node scraper_psn.js

      - name: Guardar y subir cambios
        run: |
          set -e
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"

          BRANCH="${GITHUB_REF_NAME:-main}"
          echo "Rama objetivo: ${BRANCH}"

          git add juegos_psn.json
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi

          git commit -m "Actualización automática de precios: $(date -u)"

          for intento in 1 2 3; do
            echo "Intento de push ${intento}/3"

            # Integra cambios remotos antes de cada push para evitar non-fast-forward.
            git pull --rebase origin "${BRANCH}"

            if git push origin HEAD:"${BRANCH}"; then
              echo "Push exitoso"
              exit 0
            fi

            echo "Push rechazado, reintentando..."
          done

          echo "No se pudo hacer push tras 3 intentos"
          exit 1

      - name: Trigger GitHub Pages Deploy
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
