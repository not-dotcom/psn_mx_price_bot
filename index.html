<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSN List v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #1a1a1a;
        color: #d4d4d4;
      }
      .row-game:hover {
        background-color: #262626;
      }
      input:focus {
        outline: none;
        border-color: #525252;
      }
    </style>
  </head>
  <body class="p-4 md:p-10 font-mono">
    <div class="max-w-4xl mx-auto">
      <div class="mb-6 border border-neutral-700 bg-neutral-900 p-5">
        <div class="w-full">
          <div class="flex items-baseline justify-between mb-4">
            <h1
              class="text-sm font-bold uppercase tracking-wider text-neutral-400"
            >
              PSN / Ofertas Mexico
            </h1>
            <span class="text-xs text-neutral-600">
              Actualizado: <span id="ultimaActualizacion">—</span>
            </span>
          </div>
          <input
            type="text"
            id="buscador"
            placeholder="Buscar juego..."
            class="w-full bg-neutral-950 border border-neutral-700 px-4 py-3 text-sm transition-colors"
          />
          <div class="flex flex-wrap gap-2 mt-3" id="filtrosPrecios">
            <button data-max="" class="filtro-btn px-3 py-1.5 text-xs border border-neutral-600 bg-neutral-800 text-neutral-400 active-filter">Todos</button>
            <button data-max="200" class="filtro-btn px-3 py-1.5 text-xs border border-neutral-700 bg-neutral-950 text-neutral-500">$200</button>
            <button data-max="500" class="filtro-btn px-3 py-1.5 text-xs border border-neutral-700 bg-neutral-950 text-neutral-500">$500</button>
            <button data-max="800" class="filtro-btn px-3 py-1.5 text-xs border border-neutral-700 bg-neutral-950 text-neutral-500">$800</button>
            <button data-max="1000" class="filtro-btn px-3 py-1.5 text-xs border border-neutral-700 bg-neutral-950 text-neutral-500">$1000</button>
          </div>
        </div>
      </div>

      <div class="border border-neutral-700 bg-neutral-900">
        <div
          class="grid grid-cols-12 bg-neutral-950 p-4 text-xs font-bold uppercase tracking-wider text-neutral-500 border-b border-neutral-700"
        >
          <div class="col-span-8 md:col-span-9">Titulo</div>
          <div class="col-span-4 md:col-span-3 text-right">Precio MXN</div>
        </div>

        <div id="listaJuegos" class="divide-y divide-neutral-800">
          <div class="p-10 text-center text-neutral-600">
            No hay datos cargados.
          </div>
        </div>
      </div>

      <div id="stats" class="mt-3 text-xs text-neutral-600 text-right">
        <span id="totalJuegos">0</span> resultados
      </div>
    </div>

    <script>
      let datosOriginales = [];
      let filtroMaxPrecio = null;
      const inputBuscador = document.getElementById("buscador");
      const lista = document.getElementById("listaJuegos");
      const totalJuegos = document.getElementById("totalJuegos");

      function renderizar(juegos) {
        lista.innerHTML = "";
        totalJuegos.innerText = juegos.length;

        if (juegos.length === 0) {
          lista.innerHTML =
            '<div class="p-10 text-center text-neutral-600">No se encontraron resultados.</div>';
          return;
        }

        juegos.forEach((juego) => {
          const item = document.createElement("div");
          item.className =
            "grid grid-cols-12 p-4 row-game items-center transition-colors";
          item.innerHTML = `
                    <div class="col-span-8 md:col-span-9 text-neutral-300 truncate pr-4">
                        ${juego.nombre}
                    </div>
                    <div class="col-span-4 md:col-span-3 text-right">
                        <span class="text-neutral-100 font-bold">${juego.precioFormateado}</span>
                    </div>
                `;
          lista.appendChild(item);
        });
      }

      function aplicarFiltros() {
        const busqueda = inputBuscador.value.toLowerCase();
        const filtrados = datosOriginales.filter((juego) => {
          const coincideNombre = juego.nombre.toLowerCase().includes(busqueda);
          const coincidePrecio = filtroMaxPrecio === null || (juego.precioFinalMXN !== undefined && juego.precioFinalMXN <= filtroMaxPrecio);
          return coincideNombre && coincidePrecio;
        });
        renderizar(filtrados);
      }

      inputBuscador.addEventListener("input", aplicarFiltros);

      document.getElementById("filtrosPrecios").addEventListener("click", (e) => {
        const btn = e.target.closest(".filtro-btn");
        if (!btn) return;
        document.querySelectorAll(".filtro-btn").forEach((b) => {
          b.classList.remove("active-filter", "border-neutral-600", "bg-neutral-800", "text-neutral-400");
          b.classList.add("border-neutral-700", "bg-neutral-950", "text-neutral-500");
        });
        btn.classList.add("active-filter", "border-neutral-600", "bg-neutral-800", "text-neutral-400");
        btn.classList.remove("border-neutral-700", "bg-neutral-950", "text-neutral-500");
        filtroMaxPrecio = btn.dataset.max ? Number(btn.dataset.max) : null;
        aplicarFiltros();
      });

      window.onload = async () => {
        try {
          const res = await fetch("juegos_psn.json");
          const data = await res.json();
          datosOriginales = data.juegos;
          renderizar(datosOriginales);

          if (data.lastUpdated) {
            const fecha = new Date(data.lastUpdated);
            document.getElementById("ultimaActualizacion").innerText =
              fecha.toLocaleString("es-MX", {
                timeZone: "America/Mexico_City",
              });
          }
        } catch (e) {}
      };
    </script>
  </body>
</html>
