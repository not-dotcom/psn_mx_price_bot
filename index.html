<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSN List v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #1a1a1a;
        color: #d4d4d4;
      }
      .row-game:hover {
        background-color: #262626;
      }
      input:focus {
        outline: none;
        border-color: #525252;
      }
    </style>
  </head>
  <body class="p-4 md:p-10 font-mono">
    <div class="max-w-4xl mx-auto">
      <div class="mb-6 border border-neutral-700 bg-neutral-900 p-5">
        <div class="w-full">
          <h1
            class="text-sm font-bold mb-4 uppercase tracking-wider text-neutral-400"
          >
            PSN / Ofertas Mexico
          </h1>
          <input
            type="text"
            id="buscador"
            placeholder="Buscar juego..."
            class="w-full bg-neutral-950 border border-neutral-700 px-4 py-3 text-sm transition-colors"
          />
        </div>
      </div>

      <div class="border border-neutral-700 bg-neutral-900">
        <div
          class="grid grid-cols-12 bg-neutral-950 p-4 text-xs font-bold uppercase tracking-wider text-neutral-500 border-b border-neutral-700"
        >
          <div class="col-span-8 md:col-span-9">Titulo</div>
          <div class="col-span-4 md:col-span-3 text-right">Precio MXN</div>
        </div>

        <div id="listaJuegos" class="divide-y divide-neutral-800">
          <div class="p-10 text-center text-neutral-600">
            No hay datos cargados.
          </div>
        </div>
      </div>

      <div id="stats" class="mt-3 text-xs text-neutral-600 text-right">
        <span id="totalJuegos">0</span> resultados
      </div>
    </div>

    <script>
      let datosOriginales = [];
      const inputBuscador = document.getElementById("buscador");
      const lista = document.getElementById("listaJuegos");
      const totalJuegos = document.getElementById("totalJuegos");

      function renderizar(juegos) {
        lista.innerHTML = "";
        totalJuegos.innerText = juegos.length;

        if (juegos.length === 0) {
          lista.innerHTML =
            '<div class="p-10 text-center text-neutral-600">No se encontraron resultados.</div>';
          return;
        }

        juegos.forEach((juego) => {
          const item = document.createElement("div");
          item.className =
            "grid grid-cols-12 p-4 row-game items-center transition-colors";
          item.innerHTML = `
                    <div class="col-span-8 md:col-span-9 text-neutral-300 truncate pr-4">
                        ${juego.nombre}
                    </div>
                    <div class="col-span-4 md:col-span-3 text-right">
                        <span class="text-neutral-100 font-bold">${juego.precioFormateado}</span>
                    </div>
                `;
          lista.appendChild(item);
        });
      }

      inputBuscador.addEventListener("input", (e) => {
        const busqueda = e.target.value.toLowerCase();
        const filtrados = datosOriginales.filter((juego) =>
          juego.nombre.toLowerCase().includes(busqueda),
        );
        renderizar(filtrados);
      });

      window.onload = async () => {
        try {
          const res = await fetch("juegos_psn.json");
          datosOriginales = await res.json();
          renderizar(datosOriginales);
        } catch (e) {}
      };
    </script>
  </body>
</html>
